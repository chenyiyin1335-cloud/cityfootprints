# Render Blueprint（可选）。
# 如果你在 Render 上选择 "New +" -> "Blueprint" 并指向本仓库，会自动读取这份配置创建服务。
# 也完全可以不用这个文件，直接在 Render 网页上手动创建 Web Service（见 DEPLOYMENT.md 第二步）。
services:
  - type: web
    name: footprint-map-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL_CA
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CHECKIN_MAX_DISTANCE_METERS
        value: "50"
      - key: UPLOAD_DIR
        value: uploads
      - key: AUTO_SEED_DEMO_DATA
        value: "true"
